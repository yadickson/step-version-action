---
name: "release and tagged"

on:
  push:
    tags:
      - "v*.*.*"

jobs:

  release:
    name: release
    runs-on: ubuntu-latest

    steps:
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}
          make_latest: true

  tagged:
    name: tagged
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: tagged
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | awk -F. '{print $1}')
          gh release delete "${VERSION}" --cleanup-tag --yes || true
          gh release create "${VERSION}" --title "${VERSION}"
          gh release edit "${VERSION}" --draft=false --latest
          gh release view "${VERSION}" --json assets --jq '.assets[].name' | xargs -I {} gh release delete-asset "${VERSION}" "{}" --yes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
