name: 'actions/version'
description: 'Create and share version.txt file'
outputs:
  version:
    description: "version number"
    value: ${{ steps.reading-version.outputs.version }}

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - uses: actions/checkout@v5

    - id: project_type
      uses: yadickson/actions-steps/project-type@v1

    - if: steps.project_type.outputs.type == 'node'
      id: node-version
      uses: yadickson/actions-steps/project-version/node@v1

    - if: steps.project_type.outputs.type == 'python'
      id: python-version
      uses: yadickson/actions-steps/project-version/python@v1

    - run: echo "VERSION=${{ steps.node-version.outputs.version }}${{ steps.python-version.outputs.version }}" >> $GITHUB_ENV
      shell: bash

    - id: reading-version
      run: echo "version=${{ env.VERSION }}" >> $GITHUB_OUTPUT
      shell: bash

    - run: echo "${{ env.VERSION }}" > version.txt
      shell: bash

    - uses: yadickson/actions-steps/cache-version@v1

