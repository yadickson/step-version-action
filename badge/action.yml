name: 'actions/badge'
description: 'Building badge project'
inputs:
  gist-id:
    description: gist id
    required: true

  gist-token:
    description: gist token
    required: true

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - uses: actions/checkout@v5

    - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      uses: yadickson/actions-steps/project-badge@v1
      with:
        gist-id: ${{ inputs.gist-id }}
        gist-token: ${{ inputs.gist-token }}