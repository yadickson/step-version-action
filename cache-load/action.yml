name: 'actions/cache-load'
description: 'Cache load files'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: getting version
      uses: actions/cache@v5
      with:
        path: version.txt
        key: cache-version

    - name: getting node dependencies
      if: hashFiles('package.json') != ''
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          package-lock.json
        key: cache-dependencies

    - name: getting python dependencies
      if: hashFiles('pyproject.toml') != ''
      uses: actions/cache@v5
      with:
        path: requirements.txt
        key: cache-dependencies

