name: 'actions/version'
description: 'Create and share version.txt file'
inputs:
  gist-id:
    description: gist id
    required: true

  gist-token:
    description: gist token
    required: true

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - uses: actions/checkout@v5

    - id: project_type
      uses: yadickson/actions-steps/project-type@v1

    - if: steps.project_type.outputs.type == 'node'
      uses: yadickson/actions-steps/project-version/node@v1

    - if: steps.project_type.outputs.type == 'python'
      uses: yadickson/actions-steps/project-version/python@v1

    - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      id: badge-version
      uses: yadickson/actions-steps/project-badge/version@v1
      with:
        gist-id: ${{ inputs.gist-id }}
        gist-token: ${{ inputs.gist-token }}
