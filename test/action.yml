name: 'actions/test'
description: 'Testing project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: getting node dependencies
      if: hashFiles('package.json') != ''
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          package-lock.json
        key: cache-dependencies

    - name: testing node project
      if: hashFiles('package.json') != ''
      run: npm run test
      id: testing-node
      continue-on-error: true
      shell: bash

    - name: getting python dependencies
      if: hashFiles('pyproject.toml') != ''
      uses: actions/cache@v5
      with:
        path: |
          requirements.txt
        key: cache-dependencies

    - name: testing python project
      if: hashFiles('pyproject.toml') != ''
      run: |
        pip install .[dev]
        export PATH=$PATH:/app/.local/bin
        poetry run poe test
      id: testing-python
      continue-on-error: true
      shell: bash

    - name: upload unit test report
      uses: actions/upload-artifact@v5
      with:
        name: xunit.xml
        path: reports/xunit.xml
        retention-days: 1

    - name: testing node project fail
      if: steps.testing-node.outcome == 'failure'
      run: exit 1
      shell: bash

    - name: testing python project fail
      if: steps.testing-python.outcome == 'failure'
      run: exit 1
      shell: bash
