name: 'actions/mutation'
description: 'Mutation testing project'
inputs:
  gist-id:
    description: gist id
    required: true

  gist-token:
    description: gist token
    required: true

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - uses: actions/checkout@v5

    - id: project_type
      uses: yadickson/actions-steps/project-type@v1

    - uses: yadickson/actions-steps/cache-dependencies@v1

    - if: steps.project_type.outputs.type == 'node'
      id: node-mutation
      uses: yadickson/actions-steps/project-mutation/node@v1

    - if: steps.project_type.outputs.type == 'python'
      id: python-mutation
      uses: yadickson/actions-steps/project-mutation/python@v1

    - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      id: badge-mutation
      uses: yadickson/actions-steps/project-badge/mutation@v1
      with:
        gist-id: ${{ inputs.gist-id }}
        gist-token: ${{ inputs.gist-token }}

    - name: mutation project fail
      if: steps.node-mutation.outcome == 'failure' || steps.python-mutation.outcome == 'failure'
      run: exit 1
      shell: bash

