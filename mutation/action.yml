name: 'actions/mutation'
description: 'Mutation testing project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - id: project_type
      uses: yadickson/actions-steps/project-type@v1

    - uses: yadickson/actions-steps/cache-dependencies@v1

    - if: ${{ steps.project_type.outputs.type }} == 'node'
      uses: yadickson/actions-steps/project-mutation/node@v1

    - if: ${{ steps.project_type.outputs.type }} == 'python'
      uses: yadickson/actions-steps/project-mutation/python@v1
